name: Release to npm

# Triggers on a pushed semver tag like v1.4.3. Local workflow:
#
#   1. Land your changes on main (or whatever branch you release from)
#   2. Bump the "version" field in package.json + commit + push
#   3. git tag v$NEW_VERSION
#   4. git push --tags
#
# That tag push fires this workflow, which builds the package and runs
# `npm publish --access public --provenance`. The npm tarball ships
# pre-built dist/, so the runner has to install dev deps + build first.
#
# Requires a repo secret named NPM_TOKEN — a granular access token on
# npmjs.com with publish permission on the @bcourbage scope and the
# "bypass two-factor authentication" flag set (CI can't answer 2FA
# prompts). Generate at https://www.npmjs.com/settings/<you>/tokens.

on:
  push:
    tags:
      - 'v*'

permissions:
  # Required so the publish step can mint an npm provenance attestation
  # (the small "Provenance" badge that shows up on npmjs.com next to
  # published versions, linking back to the exact CI run that built them).
  id-token: write
  # `contents: write` is needed for the GitHub Release creation step
  # below — `gh release create` writes to the repo's Releases endpoint.
  # The homebridge-config-ui-x update dialog fetches release notes from
  # the GitHub Releases API, so without this the "What's new" pane is
  # blank after an upgrade.
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # We don't commit package-lock.json (build dist is committed
        # instead, and runtime deps are small), so `npm ci` would fail
        # for lack of a lock file. `npm install` resolves fresh from
        # package.json semver ranges; acceptable for this project's
        # tiny dependency surface.
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Determine npm dist-tag from version
        # Semver prerelease versions (anything with a hyphen, e.g.
        # 1.5.0-beta.0) ship under the `beta` dist-tag so users on
        # the default `latest` tag stay on the previous GA. Plain
        # versions (1.4.3) ship under `latest`. The Create GitHub
        # Release step below also marks the release as prerelease
        # in that case so it shows up labeled in the Releases list.
        id: disttag
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish --access public --provenance --tag "${{ steps.disttag.outputs.tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract this version's section from CHANGELOG.md
        # Pulls the body of the FIRST `## [x.y.z] — date` heading in
        # CHANGELOG.md and writes it to release-notes.md. Stops at the
        # next `## ` heading or at the link-reference footer (`[1.4.2]:
        # https://...`). If CHANGELOG.md is missing or has no matching
        # heading, falls back to a one-line note so the release isn't
        # empty.
        run: |
          set -euo pipefail
          if [ -f CHANGELOG.md ]; then
            awk '
              /^## \[/ { if (found) exit; found = 1; next }
              found && /^\[[^]]+\]: / { exit }
              found { print }
            ' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md and the commit log for changes in this release." > release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `prerelease` was set by the disttag step above based on
          # whether the package.json version contains a hyphen.
          PRERELEASE: ${{ steps.disttag.outputs.prerelease }}
        run: |
          set -euo pipefail
          ARGS=()
          if [[ "$PRERELEASE" == "true" ]]; then
            ARGS+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            "${ARGS[@]}"
