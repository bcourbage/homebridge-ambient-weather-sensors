name: Build and Lint

on:
  push:
    # Run on pushes to branches only. Tag pushes are excluded because
    # release.yml fires on `v*` tags and already runs lint + build
    # before publishing — duplicating that here is wasted CI minutes.
    branches:
      - '**'
    tags-ignore:
      - '**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Match engines.node in package.json (^22.12.0 || ^24.0.0).
        # Homebridge 2 itself requires Node 22+, so older versions would
        # fail at `npm install` anyway.
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Lint the project
        run: npm run lint

      - name: Build the project
        run: npm run build

      - name: List, audit, fix outdated dependencies and build again
        run: |
          npm list --outdated
          npm audit || true  # ignore failures
          npm audit fix || true
          npm list --outdated
          npm run build
